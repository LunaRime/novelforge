name: Build & Lint

on:
  push:
    branches: [ "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "master" ]

jobs:
  # ===== 多平台质量检查（lint + typecheck + vite build） =====
  check:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [22.x]

    steps:
    - uses: actions/checkout@v4

    - uses: pnpm/action-setup@v5
      with:
        version: 9

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'pnpm'

    - name: Install dependencies
      env:
        ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
      run: pnpm install --frozen-lockfile

    - name: Lint (ESLint)
      run: pnpm run lint

    - name: Type check (TypeScript)
      run: pnpm tsc --noEmit

    - name: Build (Vite)
      run: pnpm vite build

    - name: Smoke check — verify build output
      if: ${{ !cancelled() }}
      shell: bash
      run: |
        # 1. preload 文件存在且格式正确
        PRELOAD=$(ls dist-electron/preload.* 2>/dev/null)
        if [ -z "$PRELOAD" ]; then echo "❌ preload 缺失"; exit 1; fi
        EXT="${PRELOAD##*.}"
        if [ "$EXT" = "mjs" ] && grep -q 'require(' "$PRELOAD" 2>/dev/null; then
          echo "❌ preload.mjs 包含 require() — 将在 ESM 模式下崩溃"
          exit 1
        fi
        echo "   preload: $PRELOAD"

        # 2. 主进程入口存在
        if [ ! -f "dist-electron/main.js" ]; then echo "❌ main.js 缺失"; exit 1; fi
        echo "   main: dist-electron/main.js"

        # 3. 前端入口存在
        if [ ! -f "dist/index.html" ]; then echo "❌ dist/index.html 缺失"; exit 1; fi
        echo "   renderer: dist/index.html"

        # 4. 运行构建契约检查
        node scripts/verify-build-contract.cjs

        echo "✅ CI smoke check 通过"

  # ===== Release 构建（仅 tag push 触发，Ubuntu 环境） =====
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: check
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: pnpm/action-setup@v5
      with:
        version: 9

    - name: Use Node.js 22.x
      uses: actions/setup-node@v4
      with:
        node-version: 22.x
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Build Electron app (Linux)
      env:
        CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      run: pnpm run build

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: NovelForge-linux-${{ github.ref_name }}
        path: release/*/
